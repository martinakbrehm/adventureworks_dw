version: 2

models:
  - name: dim_reasons 
    description: Este modelo representa a dimensão de razões
    columns:
      - name: reasonsk
        description: A chave substituta da razão
        tests:
          - not_null

      - name: salesorderid
        description: Identificador único do cabeçalho do pedido de venda
        tests:
          - not_null
      
      - name: salesreason_name
        description: Nome da razão da venda
        tests:
          - not_null

      - name: reasontype
        description: Categoria à qual a razão da venda pertence
        tests:
          - not_null

      - name: price
        description: Coluna para identificar a razão de Preço
        tests:
          - not_null

      - name: manufacturer
        description: Coluna para identificar a razão de Fabricante
        tests:
          - not_null

      - name: quality
        description: Coluna para identificar a razão de Qualidade
        tests:
          - not_null

      - name: promotion
        description: Coluna para identificar a razão de Em Promoção
        tests:
          - not_null

      - name: review
        description: Coluna para identificar a razão de Análise
        tests:
          - not_null

      - name: other
        description: Coluna para identificar a razão de Outro
        tests:
          - not_null

      - name: television
        description: Coluna para identificar a razão de Anúncio de Televisão
        tests:
          - not_null
