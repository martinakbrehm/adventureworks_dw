version: 2

models:
  - name: dim_products 
    description: Este modelo representa a dimensão do produto
    columns:
      - name: productsk
        description: A chave substituta do produto
        tests:
          - unique
          - not_null

      - name: productid
        description: A chave natural do produto
        tests:
          - unique
          - not_null
      
      - name: product_name
        description: O nome do produto
        tests:
          - not_null

      - name: productsubcategory_name
        description: Nome da subcategoria
        tests:
          - not_null
      
      - name: productcategory_name
        description: Nome da categoria.
        tests:
          - not_null
